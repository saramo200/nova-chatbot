<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nova AI — Bilingual Technical Assistant</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0f1e;color:#f1f5f9;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.key-screen{width:100%;max-width:440px;padding:2rem;text-align:center;}
.key-logo{font-size:48px;margin-bottom:1rem;}
.key-title{font-size:24px;font-weight:700;color:#f1f5f9;margin-bottom:8px;}
.key-sub{font-size:14px;color:#64748b;margin-bottom:2rem;line-height:1.6;}
.key-input{width:100%;background:#1e293b;border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px 16px;color:#f1f5f9;font-size:14px;outline:none;margin-bottom:12px;transition:border 0.2s;}
.key-input:focus{border-color:#6366f1;}
.key-input::placeholder{color:#475569;}
.key-btn{width:100%;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:600;color:#fff;cursor:pointer;margin-bottom:12px;}
.key-btn:hover{opacity:0.9;}
.key-link{font-size:12px;color:#6366f1;text-decoration:none;}
.key-link:hover{text-decoration:underline;}
.key-note{font-size:11px;color:#475569;margin-top:12px;}
.chat-app{width:100%;max-width:700px;height:100vh;max-height:700px;display:none;flex-direction:column;background:#0f172a;border-radius:20px;overflow:hidden;border:1px solid rgba(255,255,255,0.08);}
.chat-header{background:#0f172a;border-bottom:1px solid rgba(255,255,255,0.08);padding:14px 20px;display:flex;align-items:center;gap:12px;}
.nova-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.nova-info{flex:1;}
.nova-name{font-size:15px;font-weight:700;color:#f1f5f9;}
.nova-status{font-size:11px;color:#22c55e;display:flex;align-items:center;gap:4px;}
.nova-status::before{content:'';width:5px;height:5px;border-radius:50%;background:#22c55e;display:inline-block;}
.nova-badge{background:rgba(99,102,241,0.15);color:#a5b4fc;font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid rgba(99,102,241,0.3);}
.reset-btn{background:none;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:5px 10px;color:#64748b;font-size:11px;cursor:pointer;}
.reset-btn:hover{color:#f1f5f9;}
.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;}
.chat-messages::-webkit-scrollbar{width:4px;}
.chat-messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}
.msg{display:flex;gap:10px;align-items:flex-start;animation:fadeIn 0.2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.msg.user{flex-direction:row-reverse;}
.msg-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;}
.msg.nova .msg-avatar{background:linear-gradient(135deg,#6366f1,#8b5cf6);}
.msg.user .msg-avatar{background:#1e293b;border:1px solid rgba(255,255,255,0.1);color:#94a3b8;}
.msg-bubble{max-width:78%;padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.7;}
.msg.nova .msg-bubble{background:#1e293b;color:#e2e8f0;border:1px solid rgba(255,255,255,0.06);border-top-left-radius:4px;}
.msg.user .msg-bubble{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border-top-right-radius:4px;}
.msg-time{font-size:10px;color:#334155;margin-top:4px;}
.msg.user .msg-time{text-align:right;}
.typing{display:flex;gap:4px;align-items:center;padding:2px 0;}
.typing span{width:7px;height:7px;border-radius:50%;background:#6366f1;animation:bounce 1.2s infinite;}
.typing span:nth-child(2){animation-delay:0.2s;}
.typing span:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-8px);}}
.suggestions{display:flex;gap:8px;padding:0 16px 10px;flex-wrap:wrap;}
.sug-btn{background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.2);border-radius:20px;padding:6px 14px;font-size:12px;color:#a5b4fc;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.sug-btn:hover{background:rgba(99,102,241,0.18);}
.chat-input-area{background:#0a0f1e;border-top:1px solid rgba(255,255,255,0.06);padding:14px 16px;display:flex;gap:10px;align-items:flex-end;}
.chat-input{flex:1;background:#1e293b;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:10px 14px;color:#f1f5f9;font-size:14px;outline:none;resize:none;max-height:100px;font-family:inherit;line-height:1.5;transition:border 0.2s;}
.chat-input:focus{border-color:#6366f1;}
.chat-input::placeholder{color:#334155;}
.send-btn{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity 0.2s;}
.send-btn:hover{opacity:0.85;}
.send-btn:disabled{opacity:0.3;cursor:not-allowed;}
@media(max-width:600px){.chat-app{border-radius:0;max-height:100vh;}}
</style>
</head>
<body>

<div class="key-screen" id="keyScreen">
  <div class="key-logo">🤖</div>
  <div class="key-title">Meet Nova AI</div>
  <div class="key-sub">Your bilingual AI technical assistant.<br>Enter your free OpenRouter API key to start chatting.</div>
  <input class="key-input" type="password" id="apiKeyInput" placeholder="Paste your OpenRouter API key here..." />
  <button class="key-btn" onclick="startChat()">Start Chatting with Nova →</button>
  <br>
  <a class="key-link" href="https://openrouter.ai/keys" target="_blank">Get a free API key from OpenRouter ↗</a>
  <div class="key-note">Your API key is stored only in your browser and never sent to any server except OpenRouter.</div>
</div>

<div class="chat-app" id="chatApp">
  <div class="chat-header">
    <div class="nova-avatar">🤖</div>
    <div class="nova-info">
      <div class="nova-name">Nova AI</div>
      <div class="nova-status">Online</div>
    </div>
    <div class="nova-badge">Powered by OpenRouter</div>
    <button class="reset-btn" onclick="resetChat()">Change Key</button>
  </div>

  <div class="chat-messages" id="messages"></div>

  <div class="suggestions" id="suggestions">
    <button class="sug-btn" onclick="sendSuggestion(this)">What can you help me with?</button>
    <button class="sug-btn" onclick="sendSuggestion(this)">Explain AI simply</button>
    <button class="sug-btn" onclick="sendSuggestion(this)">ما هو الذكاء الاصطناعي؟</button>
    <button class="sug-btn" onclick="sendSuggestion(this)">Help me debug code</button>
  </div>

  <div class="chat-input-area">
    <textarea class="chat-input" id="input" placeholder="Ask Nova anything in Arabic or English..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
</div>

<script>
let apiKey = '';
let history = [];
let isLoading = false;

const SYSTEM = `You are Nova, an advanced bilingual AI technical assistant. You are helpful, intelligent, and friendly with a professional yet warm personality.

Rules:
- ALWAYS respond in the SAME language the user writes in
- If user writes Arabic → respond in Arabic only
- If user writes English → respond in English only
- You specialize in technology, programming, AI, and software development
- Give clear, practical, concise answers
- Be encouraging and supportive
- You are Nova — do not reveal what model powers you`;

function startChat() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if(!key){ alert('Please enter your API key first!'); return; }
  apiKey = key;
  document.getElementById('keyScreen').style.display = 'none';
  document.getElementById('chatApp').style.display = 'flex';
  addMessage('nova', "Hi! I'm Nova 🤖 — your bilingual AI technical assistant.<br><br>I can help you with <strong>programming, AI concepts, debugging</strong>, and much more.<br>Ask me anything in <strong>Arabic or English!</strong>");
  document.getElementById('input').focus();
}

function resetChat() {
  apiKey = ''; history = [];
  document.getElementById('messages').innerHTML = '';
  document.getElementById('chatApp').style.display = 'none';
  document.getElementById('keyScreen').style.display = 'block';
  document.getElementById('apiKeyInput').value = '';
  document.getElementById('suggestions').style.display = 'flex';
}

function getTime() {
  return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function addMessage(role, text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const avatar = role === 'nova' ? '🤖' : '👤';
  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div>
      <div class="msg-bubble">${text}</div>
      <div class="msg-time">${getTime()}</div>
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg nova'; div.id = 'typing';
  div.innerHTML = `<div class="msg-avatar">🤖</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if(t) t.remove();
}

async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if(!text || isLoading) return;

  document.getElementById('suggestions').style.display = 'none';
  input.value = ''; input.style.height = 'auto';
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  addMessage('user', text.replace(/\n/g,'<br>'));
  history.push({role:'user', content: text});
  showTyping();

  try {
    const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`,
        'HTTP-Referer': 'https://saramo200.github.io/nova-chatbot',
        'X-Title': 'Nova AI Chatbot'
      },
      body: JSON.stringify({
        model: 'openrouter/free',
        messages: [
          {role: 'system', content: SYSTEM},
          ...history
        ]
      })
    });

    const data = await res.json();
    removeTyping();

    if(data.error) {
      addMessage('nova', `Error: ${data.error.message}`);
    } else {
      const reply = data.choices?.[0]?.message?.content || 'Sorry, I could not process that.';
      history.push({role:'assistant', content: reply});
      addMessage('nova', reply.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>'));
    }
  } catch(e) {
    removeTyping();
    addMessage('nova', 'Connection error. Please check your internet and try again. 🔌');
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

function sendSuggestion(btn) {
  document.getElementById('input').value = btn.textContent;
  sendMessage();
}

function handleKey(e) {
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}
</script>
</body>
</html>
